<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Placement Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

```
<h1>🎓 Internship Placement Analyzer</h1>

<form id="analyzerForm">

    <input type="text" id="name" placeholder="Enter Your Name" required>

    <input type="number" id="cgpa" placeholder="Enter CGPA (0 - 10)" step="0.01" min="0" max="10" required>

    <select id="qualification">
        <option value="">Select Qualification</option>
        <option value="degree">Degree</option>
        <option value="diploma">Diploma</option>
    </select>

    <input type="text" id="skills" placeholder="Enter Skills (comma separated)">

    <select id="experience">
        <option value="">Experience</option>
        <option value="yes">Have Project Experience</option>
        <option value="no">No Experience</option>
    </select>

    <button type="submit">Analyze</button>

</form>

<div id="result" class="resultBox"></div>


<div id="result" class="resultBox">Powered by Xenotrix Technologies</div>
</div>

<script src="script.js"></script>

</body>
</html>
